<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto-Box | Anonymer 24h Chat</title>
    <style>
        :root {
            --bg-deep: #0b0917;
            --bg-panel: #14101f;
            --bg-panel-alt: #1a1530;
            --bg-input: #110d24;
            --border: #2c2650;
            --accent-mint: #00ffaa;
            --accent-cyan: #00bfff;
            --text-primary: #f1f1f1;
            --text-muted: #8a85a5;
            --text-dim: #635d80;
            --danger: #ff5470;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
 
        /* ---------- Login screen ---------- */
        #loginScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 20%, #1a1533 0%, #0b0917 65%);
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 16, 31, 0.8);
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }
        .login-card h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent-mint), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }
        .login-card .subtitle { font-size: 13px; color: var(--text-muted); margin: 8px 0 28px; }
        .login-card label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; }
        #loginScreen input {
            width: 100%; text-align: center; font-size: 20px; letter-spacing: 4px; font-family: 'Courier New', monospace;
            background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; color: #fff; padding: 14px; margin-bottom: 16px;
        }
        #loginScreen input:focus { outline: none; border-color: var(--accent-mint); box-shadow: 0 0 10px rgba(0, 255, 170, 0.2); }
        .btn-primary {
            width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer;
            background: linear-gradient(90deg, var(--accent-mint), #00e577); color: #0f0c20; font-weight: bold; font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(0, 255, 170, 0.3); }
        .login-status { margin-top: 14px; font-size: 13px; font-weight: 500; min-height: 18px; }
 
        /* ---------- App shell ---------- */
        #appShell { display: none; height: 100vh; }
        .app-grid { display: flex; height: 100%; }
 
        /* Sidebar */
        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-me {
            padding: 18px 18px 14px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-me .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px; }
        .sidebar-me .id-chip {
            font-family: 'Courier New', monospace; font-size: 16px; letter-spacing: 1px; color: var(--accent-mint);
            background: rgba(0, 255, 170, 0.08); border: 1px solid rgba(0, 255, 170, 0.2);
            padding: 8px 12px; border-radius: 8px; display: inline-block;
        }
        .add-friend-block { padding: 16px 18px; border-bottom: 1px solid var(--border); }
        .add-friend-block .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px; }
        .add-friend-row { display: flex; gap: 8px; }
        .add-friend-row input {
            flex: 1; min-width: 0; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px;
            color: #fff; padding: 10px 12px; font-size: 13px; font-family: 'Courier New', monospace; letter-spacing: 1px;
        }
        .add-friend-row input:focus { outline: none; border-color: var(--accent-cyan); }
        .add-friend-row button {
            flex-shrink: 0; padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;
            background: linear-gradient(90deg, var(--accent-cyan), #0088ff); color: #fff;
        }
        #friendAddStatus { font-size: 12px; margin-top: 8px; min-height: 14px; }
 
        .friend-list-label { padding: 14px 18px 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        #friendList { flex: 1; overflow-y: auto; padding: 6px 10px 14px; }
        .empty-friends { color: var(--text-dim); font-size: 13px; text-align: center; padding: 30px 10px; }
 
        .friend-row {
            display: flex; align-items: center; gap: 12px; padding: 10px 10px; border-radius: 10px; cursor: pointer;
            margin-bottom: 4px; transition: background 0.15s;
        }
        .friend-row:hover { background: var(--bg-panel-alt); }
        .friend-row.active { background: rgba(0, 191, 255, 0.1); border: 1px solid rgba(0, 191, 255, 0.25); }
        .avatar {
            width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; color: #0b0917;
        }
        .friend-meta { min-width: 0; }
        .friend-meta .fid { font-family: 'Courier New', monospace; font-size: 14px; color: var(--text-primary); letter-spacing: 0.5px; }
        .friend-meta .fstatus { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
 
        /* Main chat panel */
        .main-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .chat-header {
            height: 60px; flex-shrink: 0; display: flex; align-items: center; gap: 12px; padding: 0 22px;
            border-bottom: 1px solid var(--border); background: var(--bg-panel);
        }
        .chat-header .avatar { width: 32px; height: 32px; font-size: 11px; }
        .chat-header .fid { font-family: 'Courier New', monospace; font-size: 15px; letter-spacing: 0.5px; }
        .chat-header .hint { font-size: 11px; color: var(--text-dim); margin-left: auto; }
 
        .empty-state {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-dim);
        }
        .empty-state .glyph {
            width: 64px; height: 64px; border-radius: 50%; border: 2px dashed var(--border);
            display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--text-dim);
        }
        .empty-state p { font-size: 14px; max-width: 260px; text-align: center; line-height: 1.5; }
 
        #chatBox {
            flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 10px;
        }
        .msg { max-width: 60%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; word-break: break-word; align-self: flex-start; background: var(--bg-panel-alt); color: var(--text-primary); }
        .msg.me { align-self: flex-end; background: linear-gradient(135deg, #005f3e 0%, #004d32 100%); color: var(--accent-mint); border: 1px solid rgba(0, 255, 170, 0.15); }
 
        .message-bar { flex-shrink: 0; padding: 16px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .message-bar textarea {
            flex: 1; resize: none; height: 46px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px;
            color: #fff; padding: 12px 14px; font-size: 14px;
        }
        .message-bar textarea:focus { outline: none; border-color: var(--accent-mint); box-shadow: 0 0 10px rgba(0, 255, 170, 0.15); }
        .message-bar button {
            padding: 0 22px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px;
            background: linear-gradient(90deg, var(--accent-mint), #00e577); color: #0f0c20;
        }
 
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
 
        @media (max-width: 720px) {
            .sidebar { width: 100%; position: absolute; inset: 0; z-index: 5; }
            .sidebar.hidden-mobile { display: none; }
            .main-panel.hidden-mobile { display: none; }
            .app-grid { position: relative; }
        }
    </style>
</head>
<body>
 
<div id="loginScreen">
    <div class="login-card">
        <h1>Crypto-Box</h1>
        <div class="subtitle">Absolut anonymer Peer-to-Peer Chat. Alle Daten löschen sich nach 24h.</div>
        <label>Erstelle deine 12-stellige ID</label>
        <input type="text" id="myIdInput" maxlength="12" placeholder="938402841029">
        <button class="btn-primary" onclick="registerMyId()">Chat-Raum betreten</button>
        <div id="loginStatus" class="login-status"></div>
    </div>
</div>
 
<div id="appShell">
    <div class="app-grid">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-me">
                <div class="label">Deine ID</div>
                <div class="id-chip" id="myUsername">------------</div>
            </div>
 
            <div class="add-friend-block">
                <div class="label">Freund hinzufügen</div>
                <div class="add-friend-row">
                    <input type="text" id="friendInput" maxlength="12" placeholder="12-stellige ID...">
                    <button onclick="addFriend()">+</button>
                </div>
                <div id="friendAddStatus"></div>
            </div>
 
            <div class="friend-list-label">Aktive Verbindungen</div>
            <div id="friendList">
                <div class="empty-friends">Noch keine Freunde verbunden.</div>
            </div>
        </div>
 
        <div class="main-panel" id="mainPanel">
            <div id="chatHeader" class="chat-header" style="display:none;">
                <div class="avatar" id="chatHeaderAvatar"></div>
                <div class="fid" id="chatWithTitle"></div>
                <div class="hint">Aktualisiert automatisch</div>
            </div>
 
            <div id="emptyState" class="empty-state">
                <div class="glyph">＋</div>
                <p>Wähle links einen Freund aus, um euren verschlüsselten Chat zu öffnen.</p>
            </div>
 
            <div id="chatSection" style="display:none; flex-direction: column; flex: 1; min-height: 0;">
                <div id="chatBox"></div>
                <div class="message-bar">
                    <textarea id="msgInput" placeholder="Sichere Nachricht schreiben..."></textarea>
                    <button onclick="sendMessage()">Senden</button>
                </div>
            </div>
        </div>
    </div>
</div>
 
<script>
    let myToken = localStorage.getItem('chat_session_token');
    if (!myToken) {
        myToken = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
        localStorage.setItem('chat_session_token', myToken);
    }
 
    let activeChatFriend = null;
    let loopInterval = null;
 
    // deterministic color "fingerprint" per ID, fits the anonymous/crypto theme
    function idToGradient(id) {
        let hash = 0;
        for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
        const hueA = hash % 360;
        const hueB = (hueA + 55) % 360;
        return `linear-gradient(135deg, hsl(${hueA},70%,55%), hsl(${hueB},70%,45%))`;
    }
 
    async function registerMyId() {
        const input = document.getElementById('myIdInput');
        const status = document.getElementById('loginStatus');
        const val = input.value.trim();
 
        if (!/^\d{12}$/.test(val)) {
            status.style.color = '#ff5470';
            status.innerText = 'Die ID muss exakt aus 12 Zahlen bestehen!';
            return;
        }
 
        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: myToken, chosenId: val })
            });
            const data = await res.json();
 
            if (res.ok) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appShell').style.display = 'block';
                updateDashboard();
                loopInterval = setInterval(updateDashboard, 4000);
            } else {
                status.style.color = '#ff5470';
                status.innerText = data.message;
            }
        } catch (e) {
            status.style.color = '#ff5470';
            status.innerText = 'Server nicht erreichbar.';
        }
    }
 
    async function updateDashboard() {
        try {
            const res = await fetch(`/api/dashboard?token=${myToken}`);
            if (res.status === 401) {
                clearInterval(loopInterval);
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('appShell').style.display = 'none';
                return;
            }
            const data = await res.json();
 
            document.getElementById('myUsername').innerText = data.username;
 
            const listContainer = document.getElementById('friendList');
            if (data.friends.length === 0) {
                listContainer.innerHTML = '<div class="empty-friends">Noch keine Freunde verbunden.</div>';
            } else {
                listContainer.innerHTML = '';
                data.friends.forEach(f => {
                    const row = document.createElement('div');
                    row.className = `friend-row ${activeChatFriend === f ? 'active' : ''}`;
                    row.onclick = () => openChat(f);
                    row.innerHTML = `
                        <div class="avatar" style="background:${idToGradient(f)}">${f.slice(0, 2)}</div>
                        <div class="friend-meta">
                            <div class="fid">${f}</div>
                            <div class="fstatus">Verbunden</div>
                        </div>`;
                    listContainer.appendChild(row);
                });
            }
 
            if (activeChatFriend) {
                if (!data.friends.includes(activeChatFriend)) {
                    closeChat();
                } else {
                    loadMessages();
                }
            }
        } catch (e) {}
    }
 
    async function addFriend() {
        const input = document.getElementById('friendInput');
        const status = document.getElementById('friendAddStatus');
        const val = input.value.trim();
 
        if (!/^\d{12}$/.test(val)) {
            status.style.color = '#ff5470';
            status.innerText = 'ID muss aus 12 Zahlen bestehen!';
            return;
        }
 
        try {
            const res = await fetch('/api/friends/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: myToken, friendName: val })
            });
            const data = await res.json();
            status.style.color = res.ok ? '#00ffaa' : '#ff5470';
            status.innerText = data.message;
            input.value = '';
            updateDashboard();
        } catch (e) {
            status.style.color = '#ff5470';
            status.innerText = 'Fehler beim Verbinden.';
        }
    }
 
    function openChat(friendName) {
        activeChatFriend = friendName;
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('chatHeader').style.display = 'flex';
        document.getElementById('chatSection').style.display = 'flex';
        document.getElementById('chatWithTitle').innerText = friendName;
        document.getElementById('chatHeaderAvatar').style.background = idToGradient(friendName);
        document.getElementById('chatHeaderAvatar').innerText = friendName.slice(0, 2);
        updateDashboard();
    }
 
    function closeChat() {
        activeChatFriend = null;
        document.getElementById('emptyState').style.display = 'flex';
        document.getElementById('chatHeader').style.display = 'none';
        document.getElementById('chatSection').style.display = 'none';
    }
 
    async function loadMessages() {
        if (!activeChatFriend) return;
        try {
            const res = await fetch(`/api/messages?token=${myToken}&friend=${activeChatFriend}`);
            const messages = await res.json();
            const box = document.getElementById('chatBox');
            box.innerHTML = '';
            messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.fromMe ? 'me' : ''}`;
                div.innerText = m.text;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        } catch (e) {}
    }
 
    async function sendMessage() {
        const input = document.getElementById('msgInput');
        if (!input.value.trim() || !activeChatFriend) return;
        try {
            await fetch('/api/messages/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: myToken, toFriend: activeChatFriend, text: input.value.trim() })
            });
            input.value = '';
            loadMessages();
        } catch (e) {}
    }
 
    document.getElementById('msgInput')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
</script>
 
</body>
</html>
